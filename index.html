<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Converge Application</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    margin:0;
}

.container {
    max-width:700px;
    margin:20px auto;
}

.card {
    background:#fff;
    padding:20px;
    border-radius:15px;
}

input,select,textarea {
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

canvas {
    width:100%;
    height:120px;
    border:2px dashed #ccc;
    touch-action:none;
    border-radius:10px;
}

button {
    width:100%;
    padding:14px;
    margin-top:20px;
    background:#007bff;
    color:#fff;
    border:none;
    border-radius:10px;
}

.plan-box {
    background:#f1f7ff;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

.clear-btn {
    background:#ccc;
    color:#000;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>📡 Converge Application</h2>

<form id="form">

<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Mobile Number" required>
<textarea id="address" placeholder="Address" required></textarea>

<select id="category" onchange="loadPlans()" required>
<option value="">Select Category</option>
<option value="fiber">FiberX</option>
<option value="bundle">Bundle</option>
<option value="tod">TOD</option>
<option value="flexibiz">FlexiBiz</option>
<option value="microbiz">MicroBiz</option>
</select>

<select id="plan" onchange="showDetails()" required></select>
<div id="details" class="plan-box"></div>

<input type="file" id="idfile" required>

<h3>Signatures</h3>

<canvas id="sig1"></canvas>
<button type="button" class="clear-btn" onclick="clearCanvas(sig1)">Clear</button>

<canvas id="sig2"></canvas>
<button type="button" class="clear-btn" onclick="clearCanvas(sig2)">Clear</button>

<canvas id="sig3"></canvas>
<button type="button" class="clear-btn" onclick="clearCanvas(sig3)">Clear</button>

<button type="submit">Submit Application</button>

</form>

</div>
</div>

<script>

// ✅ EMAILJS INIT
emailjs.init("7axvwZ7yKtadp-BG9");

// ✅ FIREBASE CONFIG (YOUR REAL CONFIG)
const firebaseConfig = {
  apiKey: "AIzaSyBwrJprjuU4BywFapZyw_SsBcsJAYo5OPU",
  authDomain: "convergecrm-7c237.firebaseapp.com",
  projectId: "convergecrm-7c237",
  storageBucket: "convergecrm-7c237.firebasestorage.app",
  messagingSenderId: "1078658502451",
  appId: "1:1078658502451:web:7d81a4d127d42f15eab846"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 📡 PLANS
const plans = {

// 📶 INTERNET ONLY (FiberX)
fiber: {
"FiberX 1500": "₱1500 | up to 200 Mbps | No data cap | Free modem | 24-month lock-in",
"FiberX 2000": "₱2000 | up to 300 Mbps | No data cap | Free modem | Streaming & gaming",
"FiberX 2500": "₱2500 | up to 400 Mbps | No data cap | Work-from-home ready",
"FiberX 3500": "₱3500 | up to 800 Mbps | No data cap | Heavy usage / power users"
},

// 📺 BUNDLES (Internet + Vision TV)
bundle: {
"FiberX 1500 + Vision": "₱1599 | 200 Mbps + TV channels | Entertainment bundle",
"FiberX 2000 + Vision": "₱2099 | 300 Mbps + TV | Family plan",
"FiberX 2500 + Vision": "₱2599 | 400 Mbps + Premium TV"
},

// 🌙 TIME OF DAY (TOD)
tod: {
"FiberX 1500 TOD": "₱1500 | ~100 Mbps (day) / up to 200 Mbps (night boost)",
"FiberX 2000 TOD": "₱2000 | ~200 Mbps (day) / up to 400 Mbps (night boost)"
},

// 🏢 FLEXIBIZ (SME / Business)
flexibiz: {
"FlexiBiz 3000": "₱3000 | 300 Mbps | Business-grade | Static IP | SLA support",
"FlexiBiz 5000": "₱5000 | 500 Mbps | Priority support | Higher reliability"
},

// 🏪 MICROBIZ (Small business)
microbiz: {
"MicroBiz 1500": "₱1500 | 100 Mbps | Entry-level business",
"MicroBiz 2500": "₱2500 | 200 Mbps | Growing SMEs"
}

};

function loadPlans(){
plan.innerHTML="";
for(let p in plans[category.value]){
let o=document.createElement("option");
o.value=p;
o.text=p;
plan.appendChild(o);
}
}

function showDetails(){
details.innerHTML = plans[category.value][plan.value] || "";
}

// ✍️ SIGNATURE (SMOOTH + NO SCROLL)
function enableDraw(canvas){
let ctx = canvas.getContext("2d");
let drawing = false;

function getPos(e){
let rect = canvas.getBoundingClientRect();
return {
x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left,
y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top
};
}

function start(e){
e.preventDefault();
drawing = true;
let pos = getPos(e);
ctx.beginPath();
ctx.moveTo(pos.x, pos.y);
}

function draw(e){
if(!drawing) return;
e.preventDefault();

let pos = getPos(e);

ctx.lineWidth = 2.5;
ctx.lineCap = "round";

ctx.lineTo(pos.x, pos.y);
ctx.stroke();
}

function end(){
drawing = false;
}

canvas.addEventListener("mousedown", start);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", end);

canvas.addEventListener("touchstart", start, {passive:false});
canvas.addEventListener("touchmove", draw, {passive:false});
canvas.addEventListener("touchend", end);
}

enableDraw(sig1);
enableDraw(sig2);
enableDraw(sig3);

// CLEAR SIGNATURE
function clearCanvas(c){
c.getContext("2d").clearRect(0,0,c.width,c.height);
}

// 📄 PDF
function generatePDF(data){
const { jsPDF } = window.jspdf;
let doc = new jsPDF();

doc.text("Converge Application",20,20);
doc.text(data.name,20,40);
doc.text(data.phone,20,50);

doc.addImage(data.sig1,"PNG",20,80,50,20);

doc.save("application.pdf");
}

// 🚀 SUBMIT (FIXED)
form.addEventListener("submit", function(e){
e.preventDefault();

if(!idfile.files.length){
alert("Please upload ID");
return;
}

let reader = new FileReader();

reader.onload = async function(){

try {

let data = {
name:name.value,
phone:phone.value,
address:address.value,
category:category.value,
plan:plan.value,
details:details.innerText,
id:reader.result,
sig1:sig1.toDataURL(),
sig2:sig2.toDataURL(),
sig3:sig3.toDataURL()
};

// 🔥 SAVE FIREBASE
await db.collection("subs").add(data);

// 🔥 SEND EMAIL (YOUR CONFIG)
await emailjs.send("service_vqz7wno","template_ij15dml",data);

// 🔥 GENERATE PDF
generatePDF(data);

alert("✅ Application Submitted!");
form.reset();

} catch(err){
console.error(err);
alert("❌ Submission failed");
}

};

reader.readAsDataURL(idfile.files[0]);

});

</script>

</body>
</html>
