<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Converge Application</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<style>
body{font-family:Poppins;margin:0;background:#0d2b45;color:#fff;}
.container{max-width:700px;margin:auto;padding:20px;}
.card{background:#fff;color:#333;padding:20px;border-radius:15px;}

input,select,textarea{
width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #ddd;
}

button{
width:100%;padding:14px;margin-top:20px;border:none;border-radius:10px;
background:#007bff;color:#fff;font-weight:600;
}

/* Upload */
.upload-box{
display:block;padding:16px;border-radius:12px;border:2px dashed #ccc;
background:#f7f9fc;text-align:center;font-weight:600;cursor:pointer;margin-top:10px;
}
.upload-box input{display:none;}

#preview{
width:100%;
margin-top:10px;
border-radius:10px;
display:none;
}

/* Progress */
.progress{
width:100%;
height:8px;
background:#eee;
border-radius:10px;
margin-top:10px;
overflow:hidden;
}
.progress-bar{
height:100%;
width:0%;
background:#28a745;
}

/* Signature */
canvas{
width:100%;
height:150px;
background:#fff;
border-radius:8px;
touch-action:none;
}

.clear-btn{
background:#ccc;color:#333;
}

#loading{text-align:center;margin-top:10px;display:none;}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>📡 Converge Application</h2>

<form id="form">

<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Mobile Number" required>
<textarea id="address" placeholder="Address" required></textarea>

<select id="category" onchange="loadPlans()" required>
<option value="">Select Category</option>
<option value="super">🎮 Super Plans (TV Bundle)</option>
<option value="netflix">🍿 Netflix Bundle</option>
<option value="fiber">📶 FiberX (Internet Only)</option>
<option value="tod">🌙 Time of Day</option>
<option value="flexibiz">🏢 FlexiBiz</option>
<option value="microbiz">🏪 MicroBiz</option>
</select>

<select id="plan" required></select>
<small style="color:gray;">
* Speeds are up to maximum. Actual speeds may vary depending on location.
</small>

<!-- Upload -->
<label class="upload-box" id="uploadBox">
📤 Upload Valid ID
<input type="file" id="idfile" accept="image/*" required>
</label>

<p id="fileName"></p>
<img id="preview">

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<h4>Signature</h4>
<canvas id="sig"></canvas>
<button type="button" class="clear-btn" onclick="clearSignature()">Clear Signature</button>

<button type="submit">Submit Application</button>

</form>

<div id="loading">Uploading... Please wait</div>

</div>
</div>

<script>

// FIREBASE
firebase.initializeApp({
apiKey:"AIzaSyBwrJprjuU4BywFapZyw_SsBcsJAYo5OPU",
authDomain:"convergecrm-7c237.firebaseapp.com",
projectId:"convergecrm-7c237",
storageBucket:"convergecrm-7c237.firebasestorage.app"
});

const db = firebase.firestore();
const storage = firebase.storage();

const plans = {

// 🎮 SUPER PLANS (Bundles with TV)
super: {
"PLAY PLAN": "₱1,349 | up to 200 Mbps | Sky TV 99 (52 channels) | Xperience Box | WiFi 6 Modem",
"MAX PLAN": "₱1,599 | up to 400 Mbps | Sky TV 99 | Xperience Box | WiFi 6 Modem",
"ULTRA PLAN": "₱2,599 | up to 800 Mbps | Sky TV 99 | Xperience Box | WiFi 6 Modem"
},

// 🍿 NETFLIX BUNDLES
netflix: {
"PLAN 1558": "₱1,558 | 200 Mbps | FREE Netflix | WiFi 6 | SKY channels",
"PLAN 1798": "₱1,798 | 325 Mbps | FREE Netflix | WiFi 6 | SKY channels",
"PLAN 1998": "₱1,998 | 350 Mbps | FREE Netflix | WiFi 6 | SKY channels",
"PLAN 2298": "₱2,298 | 500 Mbps | FREE Netflix | WiFi 6 | SKY channels"
},

// 📶 FIBER X (Internet Only)
fiber: {
"FiberX 1500": "₱1,500 | up to 300 Mbps | Unlimited | WiFi modem included",
"FiberX 2000": "₱2,000 | up to 500 Mbps | Unlimited | WiFi modem included",
"FiberX 2500": "₱2,500 | up to 700 Mbps | Unlimited | WiFi modem included",
"FiberX 3500": "₱3,500 | up to 1 Gbps | XCLSV plan | Premium speed"
},

// 🌙 TIME OF DAY (TOD)
tod: {
"TOD 1699": "₱1,699 | up to 500 Mbps (peak) / 300 Mbps (off-peak)",
"TOD 3000": "₱3,000 | up to 1000 Mbps (peak) / 700 Mbps (off-peak)"
},

// 🏢 FLEXIBIZ (from your photo)
flexibiz: {
"FlexiBiz 2000": "₱2,000 | up to 100 Mbps (peak) / 50 Mbps (off-peak)",
"FlexiBiz 4000": "₱4,000 | up to 200 Mbps / 100 Mbps",
"FlexiBiz 8000": "₱8,000 | up to 400 Mbps / 200 Mbps",
"FlexiBiz 12000": "₱12,000 | up to 600 Mbps / 300 Mbps",
"FlexiBiz 15000": "₱15,000 | up to 800 Mbps / 400 Mbps",
"FlexiBiz 18000": "₱18,000 | up to 1000 Mbps / 500 Mbps"
},

// 🏪 MICROBIZ MAX (from your photo)
microbiz: {
"MicroBiz Max 75": "₱1,449 | up to 75 Mbps",
"MicroBiz Max 100": "₱1,599 | up to 100 Mbps",
"MicroBiz Max 150": "₱1,799 | up to 150 Mbps",
"MicroBiz Max 250": "₱2,099 | up to 250 Mbps",
"MicroBiz Max 400": "₱2,499 | up to 400 Mbps"
}

}

function loadPlans(){
plan.innerHTML="";
for(let p in plans[category.value]){
let o=document.createElement("option");
o.value=p;
o.text=p;
plan.appendChild(o);
}
}

// ELEMENTS
const form = document.getElementById("form");
const idfile = document.getElementById("idfile");
const preview = document.getElementById("preview");
const progressBar = document.getElementById("progressBar");
const loading = document.getElementById("loading");

// PREVIEW
idfile.addEventListener("change", function(){
const file = this.files[0];

if(file){
preview.src = URL.createObjectURL(file);
preview.style.display = "block";
}
});

// COMPRESS IMAGE
async function compressImage(file){
    return new Promise(resolve=>{
        const reader = new FileReader();

        reader.onload = e=>{
            const img = new Image();
            img.src = e.target.result;

            img.onload = ()=>{
                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");

                const maxWidth = 600;
                const scale = maxWidth / img.width;

                canvas.width = maxWidth;
                canvas.height = img.height * scale;

                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                canvas.toBlob(blob=>{
                    resolve(blob); // 🔥 RETURN BLOB (NOT BASE64)
                }, "image/jpeg", 0.6);
            };
        };

        reader.readAsDataURL(file);
    });
}

// SIGNATURE
const canvas = document.getElementById("sig");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
const rect = canvas.getBoundingClientRect();
const ratio = window.devicePixelRatio || 1;

canvas.width = rect.width * ratio;
canvas.height = rect.height * ratio;

ctx.scale(ratio, ratio);
}
resizeCanvas();

let drawing=false;

function getPos(e){
const rect = canvas.getBoundingClientRect();
return{
x:(e.touches?e.touches[0].clientX:e.clientX)-rect.left,
y:(e.touches?e.touches[0].clientY:e.clientY)-rect.top
};
}

canvas.addEventListener("mousedown",e=>{
drawing=true;
const p=getPos(e);
ctx.beginPath();
ctx.moveTo(p.x,p.y);
});

canvas.addEventListener("mousemove",e=>{
if(!drawing)return;
const p=getPos(e);
ctx.lineTo(p.x,p.y);
ctx.stroke();
});

canvas.addEventListener("mouseup",()=>drawing=false);

canvas.addEventListener("touchstart",e=>{
drawing=true;
const p=getPos(e);
ctx.beginPath();
ctx.moveTo(p.x,p.y);
},{passive:false});

canvas.addEventListener("touchmove",e=>{
if(!drawing)return;
e.preventDefault();
const p=getPos(e);
ctx.lineTo(p.x,p.y);
ctx.stroke();
},{passive:false});

canvas.addEventListener("touchend",()=>drawing=false);

function clearSignature(){
ctx.clearRect(0,0,canvas.width,canvas.height);
}

// SIGNATURE IMAGE
function getSignatureImage(){
const tempCanvas = document.createElement("canvas");
const tctx = tempCanvas.getContext("2d");

tempCanvas.width = 400;
tempCanvas.height = 150;

tctx.fillStyle="#fff";
tctx.fillRect(0,0,tempCanvas.width,tempCanvas.height);
tctx.drawImage(canvas,0,0,tempCanvas.width,tempCanvas.height);

return tempCanvas.toDataURL("image/jpeg",0.5);
}

// SUBMIT
form.addEventListener("submit", async (e)=>{
e.preventDefault();

if(!idfile.files.length){
alert("Upload ID first!");
return;
}

loading.style.display="block";

try{

// ✅ ONLY ONCE
const file = idfile.files[0];
const ref = storage.ref("ids/" + Date.now() + ".jpg");

// ✅ upload
await ref.put(file);
const idURL = await ref.getDownloadURL();

// progress full
progressBar.style.width = "100%";

// SIGNATURE
const sigData = getSignatureImage();
const sigRef = storage.ref("signatures/" + Date.now() + ".jpg");

function dataURLtoBlob(dataurl){
const arr = dataurl.split(',');
const mime = arr[0].match(/:(.*?);/)[1];
const bstr = atob(arr[1]);
let n = bstr.length;
const u8arr = new Uint8Array(n);

while(n--){
u8arr[n] = bstr.charCodeAt(n);
}

return new Blob([u8arr], {type:mime});
}

const sigBlob = dataURLtoBlob(sigData);

await sigRef.put(sigBlob);
const sigURL = await sigRef.getDownloadURL();

// SAVE TO FIRESTORE
await db.collection("applications").add({
name:name.value,
phone:phone.value,
address:address.value,
plan:plan.value,
status:"Pending",
date:new Date(),
idURL,
sigURL
});

loading.style.display="none";
alert("Application Submitted!");

form.reset();
preview.style.display="none";
progressBar.style.width="0%";
clearSignature();

}catch(err){
console.error(err);
loading.style.display="none";
alert("Upload failed. Try again.");
}

});

</script>

</body>
</html>
