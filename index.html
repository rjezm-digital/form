<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Converge Application</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box}

body{
font-family:'Poppins';
margin:0;
background:linear-gradient(135deg,#0a1f33,#0d2b45,#124264);
color:#fff;
}

/* HEADER */
.header{
text-align:center;
padding:30px 15px 10px;
}
.header h1{
margin:0;
font-size:24px;
font-weight:600;
}
.header p{
margin:5px 0 0;
font-size:13px;
opacity:0.8;
}

/* CARD */
.container{
max-width:720px;
margin:auto;
padding:15px;
}

.card{
background:#ffffff;
color:#333;
padding:25px;
border-radius:18px;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

/* INPUTS */
input,select,textarea{
width:100%;
padding:14px;
margin-top:12px;
border-radius:12px;
border:1px solid #ddd;
background:#f7f9fc;
font-size:14px;
}

input:focus,select:focus,textarea:focus{
outline:none;
border-color:#007bff;
box-shadow:0 0 0 3px rgba(0,123,255,0.15);
background:#fff;
}

/* PLAN BOX */
.plan-box{
background:#eef6ff;
padding:12px;
border-radius:12px;
margin-top:10px;
border-left:4px solid #007bff;
font-size:13px;
}

/* SIGNATURE */
.signature-box{
border:2px dashed #ccc;
border-radius:12px;
padding:10px;
margin-top:15px;
background:#fafafa;
}

canvas{
width:100%;
height:150px;
background:#fff;
border-radius:8px;
touch-action:none;
}

/* BUTTON */
button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#007bff,#0056b3);
color:#fff;
font-weight:600;
font-size:15px;
}

button:hover{
opacity:0.9;
}

.clear-btn{
background:#e0e0e0;
color:#333;
margin-top:8px;
}

/* LOADING */
#loading{
display:none;
text-align:center;
padding:40px;
color:#333;
}

.loader{
border:6px solid #eee;
border-top:6px solid #007bff;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

/* SUCCESS */
#successScreen{
display:none;
text-align:center;
padding:40px;
color:#333;
}
</style>
</head>

<body>

<div class="header">
<h1>📡 Converge Application</h1>
<p>Fast • Reliable • Unlimited Fiber Internet</p>
</div>

<div class="container">
<div class="card">

<form id="form">

<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Mobile Number" required>
<textarea id="address" placeholder="Address" required></textarea>

<select id="category" onchange="loadPlans()" required>
<option value="">Select Category</option>
<option value="super">🎮 Super Plans</option>
<option value="netflix">🍿 Netflix Bundle</option>
<option value="fiber">📶 FiberX</option>
<option value="tod">🌙 Time of Day</option>
<option value="flexibiz">🏢 FlexiBiz</option>
<option value="microbiz">🏪 MicroBiz</option>
</select>

<select id="plan" onchange="showDetails()" required></select>
<div id="details" class="plan-box"></div>

<small style="color:gray;">
* Speeds are up to maximum. Actual speeds may vary.
</small>

<input type="file" id="idfile" required>

<h3>✍️ Signatures</h3>

<div class="signature-box">
<canvas id="sig1"></canvas>
<button type="button" class="clear-btn" onclick="clearCanvas(sig1)">Clear</button>
</div>

<div class="signature-box">
<canvas id="sig2"></canvas>
<button type="button" class="clear-btn" onclick="clearCanvas(sig2)">Clear</button>
</div>

<div class="signature-box">
<canvas id="sig3"></canvas>
<button type="button" class="clear-btn" onclick="clearCanvas(sig3)">Clear</button>
</div>

<button type="submit">Submit Application</button>

</form>

<div id="loading">
<div class="loader"></div>
<p>Submitting your application...</p>
</div>

<div id="successScreen">
<h2>✅ Application Submitted</h2>
<p>We will contact you shortly.</p>
</div>

</div>
</div>

<script>

// ELEMENTS
const form = document.getElementById("form");
const loading = document.getElementById("loading");
const successScreen = document.getElementById("successScreen");

const name = document.getElementById("name");
const phone = document.getElementById("phone");
const address = document.getElementById("address");
const category = document.getElementById("category");
const plan = document.getElementById("plan");
const details = document.getElementById("details");
const idfile = document.getElementById("idfile");

const sig1 = document.getElementById("sig1");
const sig2 = document.getElementById("sig2");
const sig3 = document.getElementById("sig3");

// EMAILJS
emailjs.init("7axvwZ7yKtadp-BG9");

// FIREBASE
firebase.initializeApp({
apiKey:"AIzaSyBwrJprjuU4BywFapZyw_SsBcsJAYo5OPU",
authDomain:"convergecrm-7c237.firebaseapp.com",
projectId:"convergecrm-7c237"
});
const db = firebase.firestore();

// PLANS (UNCHANGED)
const plans = {

// 🎮 SUPER PLANS (Bundles with TV)
super: {
"PLAY PLAN": "₱1,349 | up to 200 Mbps | Sky TV 99 (52 channels) | Xperience Box | WiFi 6 Modem",
"MAX PLAN": "₱1,599 | up to 400 Mbps | Sky TV 99 | Xperience Box | WiFi 6 Modem",
"ULTRA PLAN": "₱2,599 | up to 800 Mbps | Sky TV 99 | Xperience Box | WiFi 6 Modem"
},

// 🍿 NETFLIX BUNDLES
netflix: {
"PLAN 1558": "₱1,558 | 200 Mbps | FREE Netflix | WiFi 6 | SKY channels",
"PLAN 1798": "₱1,798 | 325 Mbps | FREE Netflix | WiFi 6 | SKY channels",
"PLAN 1998": "₱1,998 | 350 Mbps | FREE Netflix | WiFi 6 | SKY channels",
"PLAN 2298": "₱2,298 | 500 Mbps | FREE Netflix | WiFi 6 | SKY channels"
},

// 📶 FIBER X (Internet Only)
fiber: {
"FiberX 1500": "₱1,500 | up to 300 Mbps | Unlimited | WiFi modem included",
"FiberX 2000": "₱2,000 | up to 500 Mbps | Unlimited | WiFi modem included",
"FiberX 2500": "₱2,500 | up to 700 Mbps | Unlimited | WiFi modem included",
"FiberX 3500": "₱3,500 | up to 1 Gbps | XCLSV plan | Premium speed"
},

// 🌙 TIME OF DAY (TOD)
tod: {
"TOD 1699": "₱1,699 | up to 500 Mbps (peak) / 300 Mbps (off-peak)",
"TOD 3000": "₱3,000 | up to 1000 Mbps (peak) / 700 Mbps (off-peak)"
},

// 🏢 FLEXIBIZ (from your photo)
flexibiz: {
"FlexiBiz 2000": "₱2,000 | up to 100 Mbps (peak) / 50 Mbps (off-peak)",
"FlexiBiz 4000": "₱4,000 | up to 200 Mbps / 100 Mbps",
"FlexiBiz 8000": "₱8,000 | up to 400 Mbps / 200 Mbps",
"FlexiBiz 12000": "₱12,000 | up to 600 Mbps / 300 Mbps",
"FlexiBiz 15000": "₱15,000 | up to 800 Mbps / 400 Mbps",
"FlexiBiz 18000": "₱18,000 | up to 1000 Mbps / 500 Mbps"
},

// 🏪 MICROBIZ MAX (from your photo)
microbiz: {
"MicroBiz Max 75": "₱1,449 | up to 75 Mbps",
"MicroBiz Max 100": "₱1,599 | up to 100 Mbps",
"MicroBiz Max 150": "₱1,799 | up to 150 Mbps",
"MicroBiz Max 250": "₱2,099 | up to 250 Mbps",
"MicroBiz Max 400": "₱2,499 | up to 400 Mbps"
}

};

function loadPlans(){
plan.innerHTML="";
for(let p in plans[category.value]){
let o=document.createElement("option");
o.value=p;o.text=p;
plan.appendChild(o);
}
}

function showDetails(){
details.innerHTML=plans[category.value][plan.value]||"";
}

// SIGNATURE
function initSignature(canvas){
const ctx=canvas.getContext("2d");

function resize(){
const rect=canvas.getBoundingClientRect();
const ratio=window.devicePixelRatio||1;
canvas.width=rect.width*ratio;
canvas.height=rect.height*ratio;
ctx.setTransform(1,0,0,1,0,0);
ctx.scale(ratio,ratio);
}
resize();

let drawing=false;

function getPos(e){
let rect=canvas.getBoundingClientRect();
return{
x:(e.touches?e.touches[0].clientX:e.clientX)-rect.left,
y:(e.touches?e.touches[0].clientY:e.clientY)-rect.top
};
}

canvas.addEventListener("mousedown",e=>{
drawing=true;
let p=getPos(e);
ctx.beginPath();
ctx.moveTo(p.x,p.y);
});

canvas.addEventListener("mousemove",e=>{
if(!drawing)return;
let p=getPos(e);
ctx.lineTo(p.x,p.y);
ctx.stroke();
});

canvas.addEventListener("mouseup",()=>drawing=false);

canvas.addEventListener("touchstart",e=>{
drawing=true;
let p=getPos(e);
ctx.beginPath();
ctx.moveTo(p.x,p.y);
},{passive:false});

canvas.addEventListener("touchmove",e=>{
if(!drawing)return;
let p=getPos(e);
ctx.lineTo(p.x,p.y);
ctx.stroke();
},{passive:false});

canvas.addEventListener("touchend",()=>drawing=false);
}

initSignature(sig1);
initSignature(sig2);
initSignature(sig3);

function clearCanvas(c){
c.getContext("2d").clearRect(0,0,c.width,c.height);
}

// 🔥 GENERATE PDF
async function generatePDF(data){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.setFontSize(14);
doc.text("Converge Application Form",20,20);

doc.setFontSize(11);
doc.text(`Name: ${data.name}`,20,40);
doc.text(`Phone: ${data.phone}`,20,50);
doc.text(`Address: ${data.address}`,20,60);
doc.text(`Plan: ${data.plan}`,20,70);

doc.addImage(data.sig1,"JPEG",20,90,60,30);
doc.addImage(data.sig2,"JPEG",20,130,60,30);

doc.addPage();
doc.addImage(data.sig3,"JPEG",20,20,60,30);
doc.addImage(data.id,"JPEG",20,70,100,60);

return doc.output("datauristring");
}

// SUBMIT
form.addEventListener("submit",function(e){
e.preventDefault();

if(!idfile.files.length){
alert("Upload ID");
return;
}

form.style.display="none";
loading.style.display="block";

let reader=new FileReader();

reader.onload = async function(){

let data={
name:name.value,
phone:phone.value,
address:address.value,
plan:plan.value,
details:details.innerText,
id:reader.result,
sig1:sig1.toDataURL("image/jpeg",0.5),
sig2:sig2.toDataURL("image/jpeg",0.5),
sig3:sig3.toDataURL("image/jpeg",0.5)
};

// FIREBASE
try{await db.collection("subs").add(data);}catch(e){console.log(e);}

// PDF
let pdfBase64 = await generatePDF(data);

// convert to downloadable link
let pdfLink = pdfBase64;

await emailjs.send("service_vqz7wno","template_ij15dml",{
name:data.name,
phone:data.phone,
plan:data.plan,
pdf_link: pdfLink
});

</script>

</body>
</html>
