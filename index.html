<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Converge Application</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box}
body{font-family:'Poppins';background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);margin:0;}
.container{max-width:720px;margin:30px auto;padding:15px;}
.card{background:#fff;padding:25px;border-radius:20px;box-shadow:0 15px 40px rgba(0,0,0,0.2);}
input,select,textarea{width:100%;padding:14px;margin-top:12px;border-radius:12px;border:1px solid #ddd;background:#f9fafc;}
.plan-box{background:#eaf4ff;padding:12px;border-radius:12px;margin-top:10px;}
.signature-box{border:2px dashed #ccc;border-radius:15px;padding:10px;margin-top:15px;}
canvas{width:100%;height:150px;background:#fff;border-radius:10px;touch-action:none;}
button{width:100%;padding:15px;margin-top:20px;border:none;border-radius:14px;background:#007bff;color:#fff;}
.clear-btn{background:#e0e0e0;color:#333;margin-top:8px;}

#loading{display:none;text-align:center;padding:30px;}
#successScreen{display:none;text-align:center;padding:30px;}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>📡 Converge Application</h2>

<form id="form">

<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Mobile Number" required>
<textarea id="address" placeholder="Address" required></textarea>

<select id="category" onchange="loadPlans()" required>
<option value="">Select Category</option>
<option value="super">🎮 Super Plans (TV Bundle)</option>
<option value="netflix">🍿 Netflix Bundle</option>
<option value="fiber">📶 FiberX (Internet Only)</option>
<option value="tod">🌙 Time of Day</option>
<option value="flexibiz">🏢 FlexiBiz</option>
<option value="microbiz">🏪 MicroBiz</option>
</select>

<select id="plan" onchange="showDetails()" required></select>
<div id="details" class="plan-box"></div>
<small style="color:gray;">
* Speeds are up to maximum. Actual speeds may vary depending on location.
</small>

<input type="file" id="idfile" required>

<h3>Signatures</h3>

<div class="signature-box">
<canvas id="sig1"></canvas>
<button type="button" class="clear-btn" onclick="clearCanvas(sig1)">Clear</button>
</div>

<div class="signature-box">
<canvas id="sig2"></canvas>
<button type="button" class="clear-btn" onclick="clearCanvas(sig2)">Clear</button>
</div>

<div class="signature-box">
<canvas id="sig3"></canvas>
<button type="button" class="clear-btn" onclick="clearCanvas(sig3)">Clear</button>
</div>

<button type="submit">Submit</button>

</form>

<div id="loading">Submitting...</div>
<div id="successScreen">✅ Submitted</div>

</div>
</div>

<script>

// ELEMENTS (FIXED)
const form = document.getElementById("form");
const loading = document.getElementById("loading");
const successScreen = document.getElementById("successScreen");

const name = document.getElementById("name");
const phone = document.getElementById("phone");
const address = document.getElementById("address");
const category = document.getElementById("category");
const plan = document.getElementById("plan");
const details = document.getElementById("details");
const idfile = document.getElementById("idfile");

const sig1 = document.getElementById("sig1");
const sig2 = document.getElementById("sig2");
const sig3 = document.getElementById("sig3");

// EMAILJS
emailjs.init("7axvwZ7yKtadp-BG9");

// FIREBASE
firebase.initializeApp({
apiKey:"AIzaSyBwrJprjuU4BywFapZyw_SsBcsJAYo5OPU",
authDomain:"convergecrm-7c237.firebaseapp.com",
projectId:"convergecrm-7c237"
});
const db = firebase.firestore();

// PLANS
const plans = {

// 🎮 SUPER PLANS (Bundles with TV)
super: {
"PLAY PLAN": "₱1,349 | up to 200 Mbps | Sky TV 99 (52 channels) | Xperience Box | WiFi 6 Modem",
"MAX PLAN": "₱1,599 | up to 400 Mbps | Sky TV 99 | Xperience Box | WiFi 6 Modem",
"ULTRA PLAN": "₱2,599 | up to 800 Mbps | Sky TV 99 | Xperience Box | WiFi 6 Modem"
},

// 🍿 NETFLIX BUNDLES
netflix: {
"PLAN 1558": "₱1,558 | 200 Mbps | FREE Netflix | WiFi 6 | SKY channels",
"PLAN 1798": "₱1,798 | 325 Mbps | FREE Netflix | WiFi 6 | SKY channels",
"PLAN 1998": "₱1,998 | 350 Mbps | FREE Netflix | WiFi 6 | SKY channels",
"PLAN 2298": "₱2,298 | 500 Mbps | FREE Netflix | WiFi 6 | SKY channels"
},

// 📶 FIBER X (Internet Only)
fiber: {
"FiberX 1500": "₱1,500 | up to 300 Mbps | Unlimited | WiFi modem included",
"FiberX 2000": "₱2,000 | up to 500 Mbps | Unlimited | WiFi modem included",
"FiberX 2500": "₱2,500 | up to 700 Mbps | Unlimited | WiFi modem included",
"FiberX 3500": "₱3,500 | up to 1 Gbps | XCLSV plan | Premium speed"
},

// 🌙 TIME OF DAY (TOD)
tod: {
"TOD 1699": "₱1,699 | up to 500 Mbps (peak) / 300 Mbps (off-peak)",
"TOD 3000": "₱3,000 | up to 1000 Mbps (peak) / 700 Mbps (off-peak)"
},

// 🏢 FLEXIBIZ (from your photo)
flexibiz: {
"FlexiBiz 2000": "₱2,000 | up to 100 Mbps (peak) / 50 Mbps (off-peak)",
"FlexiBiz 4000": "₱4,000 | up to 200 Mbps / 100 Mbps",
"FlexiBiz 8000": "₱8,000 | up to 400 Mbps / 200 Mbps",
"FlexiBiz 12000": "₱12,000 | up to 600 Mbps / 300 Mbps",
"FlexiBiz 15000": "₱15,000 | up to 800 Mbps / 400 Mbps",
"FlexiBiz 18000": "₱18,000 | up to 1000 Mbps / 500 Mbps"
},

// 🏪 MICROBIZ MAX (from your photo)
microbiz: {
"MicroBiz Max 75": "₱1,449 | up to 75 Mbps",
"MicroBiz Max 100": "₱1,599 | up to 100 Mbps",
"MicroBiz Max 150": "₱1,799 | up to 150 Mbps",
"MicroBiz Max 250": "₱2,099 | up to 250 Mbps",
"MicroBiz Max 400": "₱2,499 | up to 400 Mbps"
}

};

function loadPlans(){
plan.innerHTML="";
for(let p in plans[category.value]){
let o=document.createElement("option");
o.value=p;o.text=p;
plan.appendChild(o);
}
}

function showDetails(){
details.innerHTML=plans[category.value][plan.value]||"";
}

// SIGNATURE FIX
function initSignature(canvas){
const ctx=canvas.getContext("2d");

function resize(){
const rect=canvas.getBoundingClientRect();
const ratio=window.devicePixelRatio||1;
canvas.width=rect.width*ratio;
canvas.height=rect.height*ratio;
ctx.setTransform(1,0,0,1,0,0);
ctx.scale(ratio,ratio);
}
resize();

let drawing=false;

function getPos(e){
let rect=canvas.getBoundingClientRect();
return{
x:(e.touches?e.touches[0].clientX:e.clientX)-rect.left,
y:(e.touches?e.touches[0].clientY:e.clientY)-rect.top
};
}

canvas.addEventListener("mousedown",e=>{
drawing=true;
let p=getPos(e);
ctx.beginPath();
ctx.moveTo(p.x,p.y);
});

canvas.addEventListener("mousemove",e=>{
if(!drawing)return;
let p=getPos(e);
ctx.lineTo(p.x,p.y);
ctx.stroke();
});

canvas.addEventListener("mouseup",()=>drawing=false);

canvas.addEventListener("touchstart",e=>{
drawing=true;
let p=getPos(e);
ctx.beginPath();
ctx.moveTo(p.x,p.y);
},{passive:false});

canvas.addEventListener("touchmove",e=>{
if(!drawing)return;
let p=getPos(e);
ctx.lineTo(p.x,p.y);
ctx.stroke();
},{passive:false});

canvas.addEventListener("touchend",()=>drawing=false);
}

initSignature(sig1);
initSignature(sig2);
initSignature(sig3);

function clearCanvas(c){
c.getContext("2d").clearRect(0,0,c.width,c.height);
}

// SUBMIT
form.addEventListener("submit",function(e){
e.preventDefault();

if(!idfile.files.length){
alert("Upload ID");
return;
}

form.style.display="none";
loading.style.display="block";

let reader=new FileReader();

reader.onload = async function(){

let data={
name:name.value,
phone:phone.value,
address:address.value,
plan:plan.value,
details:details.innerText,
id:reader.result,
sig1:sig1.toDataURL(),
sig2:sig2.toDataURL(),
sig3:sig3.toDataURL()
};

// FIREBASE
try{await db.collection("subs").add(data);}catch(e){console.log(e);}

// EMAILJS WITH ATTACHMENT
try{
await emailjs.send("service_vqz7wno","template_ij15dml",{
name:data.name,
phone:data.phone,
address:data.address,
plan:data.plan,
details:data.details,
sig1:data.sig1,
sig2:data.sig2,
sig3:data.sig3,
id_image:data.id
});
}catch(e){console.log(e);}

// PDF
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
doc.text(data.name,20,20);
doc.save("application.pdf");

// SUCCESS
loading.style.display="none";
successScreen.style.display="block";

};

reader.readAsDataURL(idfile.files[0]);

});

</script>

</body>
</html>
